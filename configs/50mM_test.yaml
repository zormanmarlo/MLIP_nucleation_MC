# Debug configuration using soft-sphere potential
# Small, fast system for testing molecular MC mechanics

# Use debug potential instead of LAMMPS/NequIP
debug_potential: false

# Small system for fast testing (20 Ca + 20 CO3 = 100 atoms)
concentration: 0.05
num_particles: 100

# Short run
equil_steps: 0
prod_steps: 100000
output_interval: 100
internal_interval: 100
seed: 42

# No bias
bias_type: null

# Test all move types
translation_rate: 0.4
rotation_rate: 0.4
swap_rate: 0.0
avbmc_rate: 0.2
nvt_rate: 0.0

# Move parameters
max_displacement: 2.0

# Cutoffs
upper_cutoff: 3.7
lower_cutoff: 2.5
clust_cutoff: 3.7

# Temperature
kT: 0.6

# Energy parameters (required but not used in soft-sphere)
lower_energy_cutoff: 2.0
energy_cutoff: 20.0

# Stoichiometry (ratio format: "type1:type2")
ratio: "1:1"

# No ML model needed in debug mode
model_path: "/gscratch/cheme/mzorman/06_MLP/models/CaCO3_0417.nequip.pth"
table_path: "/gscratch/cheme/mzorman/06_MLP/TD/MC/driver_CaCO3_mol_origprior/CaCO3_prior.table"
input_path: null
input_file: null

# Debug settings
#debug_mode: false
min_cluster_size: 1

# Optional molecular geometry (null = use default)
body_file: null
